<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>受験日本史 時期判断トレーニング 前近代①版 v32</title>
  <style>
    :root{
      --bg:#fff7ed;
      --bg2:#ffedd5;
      --card:#fffdf8;
      --ink:#3b2418;
      --muted:#8a6250;
      --line:#fed7aa;
      --soft:#ffedd5;
      --brand:#c05621;
      --brand2:#fb923c;
      --accent:#f97316;
      --accent2:#fdba74;
      --ok:#0f9d58;
      --ok-bg:#ecfff4;
      --ng:#d64545;
      --ng-bg:#fff1f1;
      --shadow:0 12px 28px rgba(133, 95, 62, .10);
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      background:
        radial-gradient(circle at top left, #fff4e6 0, #fff4e6 26%, transparent 27%) 0 0/90px 90px,
        linear-gradient(180deg, var(--bg2), var(--bg));
      color:var(--ink);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN","Yu Gothic","Noto Sans JP",sans-serif;
    }
    .wrap{max-width:1140px;margin:0 auto;padding:24px}
    .hero,.card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:30px;
      box-shadow:var(--shadow);
    }
    .hero{padding:26px 28px;margin-bottom:22px;overflow:hidden;position:relative}
    .hero::before{
      content:"";
      position:absolute;right:-40px;top:-40px;width:220px;height:220px;border-radius:50%;
      background:radial-gradient(circle, rgba(243,198,138,.36), rgba(243,198,138,0));
      pointer-events:none;
    }
    .heroGrid{display:grid;grid-template-columns:1.2fr .8fr;gap:20px;align-items:center}
    .mascotArea{display:flex;justify-content:center;gap:12px;flex-wrap:wrap}
    .miniCard{
      background:#fff7ed;border:1px solid var(--line);border-radius:22px;padding:10px 12px;box-shadow:0 6px 16px rgba(133,95,62,.08)
    }
    h1{font-size:34px;line-height:1.28;margin:12px 0 12px}
    h2{font-size:20px;margin:0 0 14px}
    h3{font-size:16px;margin:0 0 8px}
    p{line-height:1.8}
    .lead{font-size:14px;color:var(--muted)}
    .badge{
      display:inline-block;margin:0 8px 8px 0;padding:8px 12px;border-radius:999px;
      background:var(--soft);color:#9a3412;font-size:12px;font-weight:800;border:1px solid #fed7aa;
    }

    .grid{display:grid;gap:18px}
    .grid2{grid-template-columns:1.25fr .75fr}
    .modes{grid-template-columns:repeat(2,minmax(0,1fr))}
    .choices{grid-template-columns:repeat(2,minmax(0,1fr))}
    .choices.three{grid-template-columns:repeat(3,minmax(0,1fr))}
    .countRow{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    @media (max-width:920px){
      .heroGrid,.grid2,.modes,.choices,.choices.three,.questionHead,.explainWrap,.diffGrid,.diffRow{grid-template-columns:1fr}
      h1{font-size:28px}
    }

    button{font:inherit}
    .card{padding:22px}
    .selectCard,.scopeBtn,.choiceBtn,.countBtn,.primary,.secondary,.ghostBtn{
      border-radius:22px;border:1px solid var(--line);background:white;cursor:pointer;transition:.18s ease;
    }
    .selectCard,.scopeBtn{padding:18px;text-align:left}
    .selectCard:hover,.scopeBtn:hover,.choiceBtn:hover,.countBtn:hover,.secondary:hover,.ghostBtn:hover{
      transform:translateY(-2px);box-shadow:0 10px 18px rgba(133,95,62,.09)
    }
    .active{
      background:linear-gradient(180deg,#f97316,#c2410c)!important;color:white!important;border-color:#c2410c!important;
    }
    .active .hint{color:#f5ddc7!important}
    .hint{color:var(--muted);font-size:13px}
    .small{font-size:13px;color:var(--muted)}
    .scopeBtn{display:block;width:100%;margin:10px 0}
    .countBtn{padding:12px;font-weight:900}
    .primary{
      background:linear-gradient(180deg,#fb923c,#ea580c);color:white;border-color:#ea580c;
      padding:15px 18px;font-weight:900;width:100%;
    }
    .primary:disabled{background:#d8d0c8;border-color:#d8d0c8;cursor:not-allowed}
    .secondary,.ghostBtn{
      padding:11px 14px;font-weight:900;color:var(--ink);background:#fffdf9;
    }
    .ghostBtn{background:#fff7eb}
    .pill{
      display:inline-flex;align-items:center;gap:6px;padding:8px 12px;background:#fff7eb;border:1px solid var(--line);
      border-radius:999px;font-size:12px;font-weight:800;color:#9a3412;
    }

    .topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px}
    .progressWrap{
      position:relative;background:#f1e4d3;border-radius:999px;overflow:hidden;margin-bottom:18px;height:14px;border:1px solid #eadfcd;
    }
    .bar{
      height:100%;
      background:linear-gradient(90deg,#fed7aa,#fb923c,#f97316);
      border-radius:999px;
      transition:width .25s ease;
    }

    .questionHead{
      display:grid;
      grid-template-columns:128px 1fr;
      gap:16px;
      align-items:center;
      margin-bottom:8px;
      background:linear-gradient(180deg,#fffaf3,#fff6ea);
      border:1px solid #f0e2cf;
      border-radius:24px;
      padding:14px 16px;
    }
    .questionArt{
      display:flex;align-items:center;justify-content:center;
      background:#fffdf8;border:1px solid var(--line);border-radius:22px;
      min-height:116px;
      overflow:hidden;
    }
    .questionText p{margin:.2rem 0}
    .questionTitle{font-size:30px;font-weight:1000;margin:6px 0 4px}
    .choiceGroup{
      background:linear-gradient(180deg,#fffaf3,#fff5e8);
      padding:16px;border-radius:24px;margin:16px 0;border:1px solid #f0e2cf;
    }
    .choiceBtn{
      position:relative;
      padding:14px 16px;text-align:left;font-weight:800;background:#ffffff;
    }
    .choiceBtn::before{
      content:"";
      position:absolute;inset:0;border-radius:20px;
      box-shadow:inset 0 0 0 0 rgba(0,0,0,0);
      transition:.15s ease;
    }
    .choiceBtn:hover::before{box-shadow:inset 0 0 0 2px rgba(167,116,75,.14)}
    .picked{
      background:linear-gradient(180deg,#f97316,#c2410c)!important;color:white!important;border-color:#c2410c!important;
    }
    .correct{
      background:linear-gradient(180deg,#f0fff7,#e6fff0)!important;
      color:var(--ok)!important;
      border-color:#7dd3a7!important;
      box-shadow:0 0 0 3px rgba(16,185,129,.12);
    }
    .wrong{
      background:linear-gradient(180deg,#fff8f8,#fff0f0)!important;
      color:var(--ng)!important;
      border-color:#f1a7a7!important;
      box-shadow:0 0 0 3px rgba(214,69,69,.10);
    }

    .answerBox{
      border:1px solid var(--line);border-radius:24px;padding:16px;margin-top:16px;background:white;
    }
    .answerItem{
      display:flex;justify-content:space-between;align-items:center;
      background:#fff7ed;border:1px solid var(--line);border-radius:18px;padding:12px 14px;margin:8px 0;font-weight:900
    }
    .answerMain{display:flex;align-items:center;gap:10px}
    .step{
      width:28px;height:28px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;
      background:#f3dfbf;color:#8a5b39;font-size:12px;font-weight:900;flex:0 0 auto;
    }

    .statusBanner{
      display:flex;align-items:center;gap:16px;padding:16px 18px;border-radius:24px;margin-bottom:14px;
      border:2px solid transparent;
      animation:pop .22s ease;
      position:relative;
      overflow:hidden;
    }
    .statusBanner.ok{
      background:linear-gradient(180deg,#f0fff7,#e7fff2);border-color:#9fe3bc;color:#086a3a;
      box-shadow:0 10px 22px rgba(15,157,88,.10);
    }
    .statusBanner.ng{
      background:linear-gradient(180deg,#fff8f8,#fff0f0);border-color:#f2b2b2;color:#aa2f2f;
      box-shadow:0 10px 22px rgba(214,69,69,.10);
    }
    .statusIcon{
      width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;
      font-size:30px;font-weight:900;flex:0 0 auto;background:white;
      box-shadow:0 6px 16px rgba(0,0,0,.06);z-index:1;
    }
    .ok .statusIcon{color:var(--ok);border:2px solid #9fe3bc}
    .ng .statusIcon{color:var(--ng);border:2px solid #f2b2b2}
    .statusTitle{font-size:24px;font-weight:1000;line-height:1.2}
    .statusText{font-size:13px;line-height:1.7}
    @keyframes pop{
      from{transform:scale(.96);opacity:.4}
      to{transform:scale(1);opacity:1}
    }

    /* 正解時のちょっとしたアニメーション */
    .confetti{
      position:absolute; inset:0; pointer-events:none;
    }
    .piece{
      position:absolute; top:-16px; width:10px; height:14px; border-radius:3px;
      animation:fall 1.1s ease-out forwards;
      opacity:.95;
    }
    .piece.c1{background:#f6d365}
    .piece.c2{background:#8fd3f4}
    .piece.c3{background:#fda085}
    .piece.c4{background:#84fab0}
    .piece.c5{background:#ffd1dc}
    .piece.p1{left:8%}.piece.p2{left:18%}.piece.p3{left:30%}.piece.p4{left:42%}.piece.p5{left:54%}
    .piece.p6{left:64%}.piece.p7{left:74%}.piece.p8{left:84%}.piece.p9{left:92%}
    .piece.d1{animation-delay:0s}.piece.d2{animation-delay:.06s}.piece.d3{animation-delay:.12s}.piece.d4{animation-delay:.18s}
    .piece.d5{animation-delay:.24s}.piece.d6{animation-delay:.30s}.piece.d7{animation-delay:.36s}.piece.d8{animation-delay:.42s}
    .piece.d9{animation-delay:.48s}
    @keyframes fall{
      0%{transform:translateY(-10px) rotate(0deg); opacity:0}
      15%{opacity:1}
      100%{transform:translateY(100px) rotate(260deg); opacity:0}
    }
    .celebrate{
      display:inline-block;
      animation:jump 0.7s ease 1;
      transform-origin:center;
    }
    @keyframes jump{
      0%,100%{transform:translateY(0) scale(1)}
      30%{transform:translateY(-6px) scale(1.08)}
      60%{transform:translateY(0) scale(1)}
      75%{transform:translateY(-3px) scale(1.03)}
    }

    .explainWrap{
      display:grid;
      grid-template-columns:128px 1fr;
      gap:16px;
      align-items:start;
      margin-top:18px;
      background:linear-gradient(180deg,#c05621,#9a3412);
      color:white;border-radius:24px;padding:18px;
      box-shadow:0 12px 24px rgba(194,93,25,.20);
    }
    .explainArt{
      display:flex;align-items:center;justify-content:center;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.12);
      border-radius:20px;
      min-height:116px;
      overflow:hidden;
    }
    .explain .muted{color:#f6e5d3}
    .answerChips{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
    .chip{
      padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.18);
      border:1px solid rgba(255,255,255,.18);font-size:13px;font-weight:800
    }

    .diffBox{
      margin-top:16px;
      background:#fffaf8;
      border:1px solid #ecd9ca;
      border-radius:20px;
      padding:14px;
      color:var(--ink);
    }
    .diffTitle{
      font-size:14px;font-weight:1000;margin-bottom:10px;color:#7a5140;
    }
    .diffGrid{
      display:grid;
      gap:10px;
    }
    .diffRow{
      display:grid;
      grid-template-columns:140px 1fr 1fr;
      gap:10px;
      align-items:stretch;
    }
    .diffHead{
      padding:10px 12px;border-radius:14px;background:#ffedd5;border:1px solid #ecd9ca;font-weight:900;
    }
    .diffCell{
      padding:10px 12px;border-radius:14px;border:1px solid #eadfcd;background:white;font-weight:800;
    }
    .same{background:#f2fff6;border-color:#b8e7c9;color:#0c7f47}
    .different{
      position:relative;
      background:#fff4f4;
      border-color:#efb2b2;
      color:#b53d3d;
      box-shadow:inset 0 0 0 2px rgba(214,69,69,.12);
    }
    .wrongRow .diffCell:first-child{
      background:#fff0f0;
      border-color:#efb2b2;
      color:#9f3030;
    }
    .bigX{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:30px;
      height:30px;
      margin-right:8px;
      border-radius:50%;
      background:#d64545;
      color:white;
      font-size:22px;
      font-weight:1000;
      line-height:1;
      box-shadow:0 4px 10px rgba(214,69,69,.22);
      vertical-align:middle;
    }
    .answerTextWithMark{
      display:flex;
      align-items:center;
      gap:2px;
    }
    .labelBad{
      display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:900;margin-left:8px;
      background:#ffe1e1;color:#b53d3d;border:1px solid #f1b7b7;
    }
    .labelGood{
      display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:900;margin-left:8px;
      background:#e6fff0;color:#0c7f47;border:1px solid #b8e7c9;
    }

    .footerActions{
      display:flex;justify-content:space-between;gap:12px;align-items:center;
      border-top:1px dashed #eddcc8;padding-top:18px;margin-top:22px;flex-wrap:wrap
    }
    .resultMini{font-weight:900}
    .resultBig{font-size:54px;font-weight:1000;margin:18px 0 0}
    .reviewItem{
      background:white;border:1px solid var(--line);border-radius:18px;padding:14px;margin:10px 0
    }
    .note{
      border-left:4px solid #f97316;background:#fff7ed;padding:12px 14px;border-radius:14px;color:#7c2d12;font-size:13px;line-height:1.7
    }
    .summaryCard{
      background:linear-gradient(180deg,#fffaf3,#fff5e8);
      border:1px solid var(--line);border-radius:26px;padding:18px
    }
  
    /* --- tablet / smartphone optimization --- */
    html{
      -webkit-text-size-adjust:100%;
      scroll-behavior:smooth;
    }
    button{
      -webkit-tap-highlight-color:rgba(166,103,44,.16);
      touch-action:manipulation;
    }
    .choiceBtn,.primary,.secondary,.ghostBtn,.selectCard,.scopeBtn,.countBtn{
      min-height:48px;
    }
    @media (max-width:720px){
      .wrap{
        padding:12px;
      }
      .hero,.card{
        border-radius:22px;
      }
      .hero{
        padding:18px 16px;
        margin-bottom:14px;
      }
      .card{
        padding:16px;
      }
      h1{
        font-size:23px;
        line-height:1.35;
      }
      h2{
        font-size:18px;
      }
      .lead,.small,.hint{
        font-size:13px;
      }
      .badge{
        font-size:11px;
        padding:6px 9px;
        margin-right:4px;
      }
      .mascotArea{
        gap:8px;
      }
      .miniCard{
        padding:6px;
        border-radius:16px;
      }
      .miniCard svg{
        width:82px;
        height:82px;
      }
      .questionHead{
        grid-template-columns:82px 1fr;
        gap:10px;
        padding:10px;
        border-radius:18px;
      }
      .questionArt{
        min-height:82px;
        border-radius:16px;
      }
      .questionArt svg{
        width:78px;
        height:78px;
      }
      .questionTitle{
        font-size:23px;
        line-height:1.35;
      }
      .choiceGroup{
        padding:12px;
        border-radius:18px;
        margin:12px 0;
      }
      .choices,.choices.three{
        grid-template-columns:1fr;
        gap:10px;
      }
      .choiceBtn{
        padding:14px 13px;
        font-size:16px;
        line-height:1.45;
      }
      .topbar{
        align-items:flex-start;
      }
      .topbar .secondary{
        width:100%;
      }
      .pill{
        margin-top:4px;
      }
      .footerActions{
        display:block;
      }
      .footerActions > div:last-child{
        display:grid;
        gap:10px;
        margin-top:12px;
      }
      .footerActions .primary,
      .footerActions .secondary{
        width:100%!important;
      }
      .explainWrap{
        grid-template-columns:1fr;
        padding:14px;
        border-radius:20px;
      }
      .explainArt{
        min-height:78px;
      }
      .explainArt svg{
        width:82px;
        height:82px;
      }
      .statusBanner{
        padding:12px;
        border-radius:18px;
        gap:10px;
      }
      .statusIcon{
        width:50px;
        height:50px;
        font-size:26px;
      }
      .statusTitle{
        font-size:21px;
      }
      .diffRow{
        grid-template-columns:1fr;
        gap:6px;
      }
      .diffHead:nth-child(1),
      .diffHead:nth-child(2),
      .diffHead:nth-child(3){
        display:none;
      }
      .diffCell{
        font-size:14px;
      }
      .bigX{
        width:28px;
        height:28px;
        font-size:20px;
      }
      .resultBig{
        font-size:42px;
      }
    }
    @media (max-width:390px){
      .questionHead{
        grid-template-columns:1fr;
      }
      .questionArt{
        min-height:70px;
      }
      .questionArt svg{
        width:72px;
        height:72px;
      }
      .questionTitle{
        font-size:21px;
      }
    }

</style>
</head>
<body>
<div id="app"></div>

<script>
const MODES = [
  {id:"order", label:"年代順並べ替え", short:"古い順に並べる", desc:"出来事・人物・政策を古い順に並べ、歴史の流れを確認します。"},
  {id:"period", label:"時代・世紀・政権担当者判断", short:"いつ？ 誰の時期？", desc:"何時代か、何世紀か、前半／後半、関係する政権担当者を判断します。"},
  {id:"culture", label:"文化史の時期判断", short:"文化・作品・人物の時期", desc:"文化史の用語について、時代・世紀・前半／後半・文化区分を判断します。"},
  {id:"random", label:"総合ランダム", short:"全モード混合", desc:"年代順・時代判断・文化史判断を混ぜて出題します。"}
];
const SCOPES = [
  {id:"all", label:"全範囲", desc:"前近代編＋近現代編"},
  {id:"premodern", label:"前近代編", desc:"原始・古代・中世・近世"},
  {id:"modern", label:"近現代編", desc:"幕末・明治・大正・昭和・戦後"}
];
const COUNTS = [5,10,20];

const ERA_NEIGHBORS = {
  "弥生時代":["縄文時代","弥生時代","古墳時代","飛鳥時代"],
  "古墳時代":["弥生時代","古墳時代","飛鳥時代","奈良時代"],
  "飛鳥時代":["古墳時代","飛鳥時代","奈良時代","平安時代"],
  "奈良時代":["飛鳥時代","奈良時代","平安時代","鎌倉時代"],
  "平安時代":["奈良時代","平安時代","鎌倉時代","室町時代"],
  "鎌倉時代":["平安時代","鎌倉時代","室町時代","南北朝時代"],
  "室町時代":["鎌倉時代","南北朝時代","室町時代","戦国時代"],
  "戦国時代":["室町時代","戦国時代","安土桃山時代","江戸時代"],
  "安土桃山時代":["室町時代","戦国時代","安土桃山時代","江戸時代"],
  "江戸時代":["安土桃山時代","江戸時代","江戸時代末期","明治時代"],
  "江戸時代末期":["江戸時代","江戸時代末期","明治時代","大正時代"],
  "明治時代":["江戸時代末期","明治時代","大正時代","昭和戦前"],
  "大正時代":["明治時代","大正時代","昭和戦前","昭和戦後"],
  "昭和戦前":["明治時代","大正時代","昭和戦前","昭和戦後"],
  "昭和戦後":["昭和戦前","昭和戦後","平成時代","令和時代"],
  "平成時代":["昭和戦後","平成時代","令和時代","昭和戦前"]
};

const PERSON_NEIGHBORS = {
  "文武天皇":["天武天皇","持統天皇","文武天皇","元明天皇"],
  "聖武天皇":["元明天皇","元正天皇","聖武天皇","孝謙天皇"],
  "桓武天皇":["聖武天皇","孝謙天皇","桓武天皇","嵯峨天皇"],
  "白河上皇":["後三条天皇","白河上皇","鳥羽上皇","後白河上皇"],
  "平清盛":["源義朝","平清盛","後白河上皇","源頼朝"],
  "源頼朝":["平清盛","源頼朝","源頼家","源実朝"],
  "北条義時":["北条時政","北条義時","北条泰時","北条時頼"],
  "北条泰時":["北条義時","北条泰時","北条時頼","北条時宗"],
  "北条時宗":["北条泰時","北条時頼","北条時宗","北条貞時"],

function shuffle(a){const x=[...a];for(let i=x.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[x[i],x[j]]=[x[j],x[i]]}return x}
function typesFor(mode){return mode==="random"?["order","period","culture"]:[mode]}
function pool(){const types=typesFor(state.mode);return QUESTIONS.filter(q=>types.includes(q.type)&&(state.scope==="all"||q.scope===state.scope))}
function initialAnswer(q){
  if(q.type==="order") return [];
  if(q.type==="period"){
    const ans = {era:""};
    if(usesTimeRange(q)){
      ans.timeRange = "";
    }else{
      ans.century = "";
      ans.half = "";
    }
    if(shouldAskPerson(q)) ans.person = "";
    if(shouldAskActor(q)) ans.actor = "";
    return ans;
  }
  if(q.type==="culture"){
    const ans = {era:"", culture:""};
    if(usesTimeRange(q)){
      ans.timeRange = "";
    }else if(!omitsCenturyHalf(q)){
      ans.century = "";
      ans.half = "";
    }
    return ans;
  }
  return {era:"", century:"", half:"", culture:""};
}

function playTone(ctx, frequency, start, duration, type="sine", volume=0.12){
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(frequency, start);
  gain.gain.setValueAtTime(0.0001, start);
  gain.gain.exponentialRampToValueAtTime(volume, start + 0.02);
  gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(start);
  osc.stop(start + duration + 0.02);
}

function playResultSound(isCorrect){
  try{
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    if(!AudioContext) return;
    const ctx = new AudioContext();

    const startSound = ()=>{
      const now = ctx.currentTime + 0.03;

      if(isCorrect){
        // ピンポン：柔らかいが聞き取りやすい上昇3音
        playTone(ctx, 784, now, 0.15, "triangle", 0.24);
        playTone(ctx, 1047, now + 0.13, 0.17, "triangle", 0.25);
        playTone(ctx, 1319, now + 0.29, 0.20, "triangle", 0.20);
      }else{
        // ブー：PCスピーカーでも聞こえやすい中低音。音量と長さを強化。
        playTone(ctx, 392, now, 0.20, "triangle", 0.34);
        playTone(ctx, 294, now + 0.18, 0.46, "triangle", 0.38);
        playTone(ctx, 196, now + 0.20, 0.46, "sine", 0.18);
        // 柔らかさを残しつつ輪郭を出す短い低音パルス
        playTone(ctx, 147, now + 0.23, 0.34, "square", 0.07);
      }

      setTimeout(()=>ctx.close(), 1200);
    };

    if(ctx.state === "suspended"){
      ctx.resume().then(startSound).catch(startSound);
    }else{
      startSound();
    }
  }catch(e){
    // 音が鳴らない環境でもアプリ本体は止めない
  }
}
function centuryNum(s){return Number(String(s).replace("世紀",""))}
function adjacentCenturyOptions(correct){
  const n = centuryNum(correct);
  const nums = [n-1,n,n+1,n+2].filter(x=>x>0);
  if(nums.length < 4 && n-2>0) nums.unshift(n-2);
  return shuffle([...new Set(nums)].slice(0,4).map(x=>`${x}世紀`));
}
function decadeNum(label){
  const m = String(label||"").match(/(\d{4})年代/);
  return m ? Number(m[1]) : 0;
}
function adjacentDecadeOptions(correct){
  const d = decadeNum(correct);
  const vals = [d-10, d, d+10, d+20].filter(x=>x>0).map(x=>`${x}年代`);
  return shuffle([...new Set(vals)].slice(0,4));
}
function halfDecadeIndex(label){
  const m = String(label||"").match(/(\d{4})年代(前半|後半)/);
  if(!m) return 0;
  return Number(m[1]) * 2 + (m[2] === "後半" ? 1 : 0);
}
function halfDecadeLabelFromIndex(idx){
  const decade = Math.floor(idx / 2);
  const half = idx % 2 === 0 ? "前半" : "後半";
  return `${decade}年代${half}`;
}
function adjacentHalfDecadeOptions(correct){
  const idx = halfDecadeIndex(correct);
  const vals = [idx-1, idx, idx+1, idx+2].filter(x=>x>0).map(halfDecadeLabelFromIndex);
  return shuffle([...new Set(vals)].slice(0,4));
}
function usesTimeRange(q){
  return q && q.timeRange;
}
function omitsCenturyHalf(q){
  return Boolean(q && q.omitCenturyHalf);
}
const PERSON_ALIAS_GROUPS = [
  ["ワカタケル大王", "倭王武"],
  ["中大兄皇子", "天智天皇"],
  ["大海人皇子", "天武天皇"],
  ["オホド大王", "継体天皇"],
  ["聖徳太子", "厩戸王", "厩戸皇子"],
  ["中臣鎌足", "藤原鎌足"],
  ["皇極天皇", "斉明天皇"],
  ["孝謙天皇", "称徳天皇"],
  ["大友皇子", "弘文天皇"],
  ["白河天皇", "白河上皇"],
  ["後白河天皇", "後白河上皇"],
  ["大友皇子", "弘文天皇"],
  ["吉田茂内閣", "第1次吉田茂内閣", "第2次吉田茂内閣", "第3次吉田茂内閣", "第4次吉田茂内閣"],
  ["第1次伊藤博文内閣", "第2次伊藤博文内閣", "第3次伊藤博文内閣", "第4次伊藤博文内閣"],
  ["第1次桂太郎内閣", "第2次桂太郎内閣", "第3次桂太郎内閣"],
  ["第1次若槻礼次郎内閣", "第2次若槻礼次郎内閣"],
  ["第1次近衛文麿内閣", "第2次近衛文麿内閣", "第3次近衛文麿内閣"]
];

function personAliasKey(name){
  for(const group of PERSON_ALIAS_GROUPS){
    if(group.includes(name)) return group.join("／");
  }
  return name;
}

function samePersonAlias(a, b){
  return personAliasKey(a) === personAliasKey(b);
}

function neighborOptions(correct, map, fallbackPool, n=4){
  const base = map[correct] || [correct, ...fallbackPool.filter(x=>x!==correct)];
  const result = [];

  function addCandidate(x){
    if(!x) return;
    // 正解と同一人物の別名は、同一設問の選択肢から除外する。
    if(x !== correct && samePersonAlias(x, correct)) return;
    // 既に入っている選択肢と同一人物の別名も除外する。
    if(result.some(y => y === x || samePersonAlias(y, x))) return;
    result.push(x);
  }

  addCandidate(correct);
  base.forEach(addCandidate);
  fallbackPool.forEach(addCandidate);

  return shuffle(result.slice(0, n));
}
function shouldAskPerson(q){
  return q && q.type === "period" && q.person && q.personRequired === true;
}
function shouldAskActor(q){
  return q && q.type === "period" && q.actor && q.actorRequired === true;
}
function enhanceQuestion(q){
  if(q.type==="order") return {...q, displayItems:shuffle(q.items)};
  if(q.type==="period"){
    const opts = {
      era: neighborOptions(q.era, ERA_NEIGHBORS, Object.keys(ERA_NEIGHBORS))
    };
    if(usesTimeRange(q)){
      opts.timeRange = q.timeLevel === "halfdecade"
        ? adjacentHalfDecadeOptions(q.timeRange)
        : adjacentDecadeOptions(q.timeRange);
    }else{
      opts.century = adjacentCenturyOptions(q.century);
      opts.half = ["前半","後半"];
    }
    if(shouldAskPerson(q)){
      opts.person = neighborOptions(q.person, RULER_NEIGHBORS, RULER_FALLBACK);
    }
    if(shouldAskActor(q)){
      opts.actor = neighborOptions(q.actor, ACTOR_NEIGHBORS, ACTOR_FALLBACK);
    }
    return {...q, options: opts};
  }
  return {...q, options:{
    era: neighborOptions(q.era, ERA_NEIGHBORS, Object.keys(ERA_NEIGHBORS)),
    ...(usesTimeRange(q)
      ? {timeRange: q.timeLevel === "halfdecade" ? adjacentHalfDecadeOptions(q.timeRange) : adjacentDecadeOptions(q.timeRange)}
      : {century: adjacentCenturyOptions(q.century), half: ["前半","後半"]}),
    culture: neighborOptions(q.culture, CULTURE_NEIGHBORS, Object.keys(CULTURE_NEIGHBORS))
  }};
}
function start(){
  let q=shuffle(pool()).slice(0, Math.min(state.count,pool().length)).map(enhanceQuestion);
  state={...state, screen:"quiz", quiz:q, index:0, answer:initialAnswer(q[0]), submitted:false, results:[]};
  render();
  scrollToQuizTop(".questionHead");
}
function isCorrect(q,a){
  if(q.type==="order"){
    const correct=[...q.items].sort((x,y)=>x[1]-y[1]).map(x=>x[0]);
    return a.length===q.items.length && a.every((it,i)=>it[0]===correct[i])
  }
  if(q.type==="period"){
    const timeOk = usesTimeRange(q) ? a.timeRange===q.timeRange : (a.century===q.century && a.half===q.half);
    const base = a.era===q.era && timeOk;
    const personOk = shouldAskPerson(q) ? a.person===q.person : true;
    const actorOk = shouldAskActor(q) ? a.actor===q.actor : true;
    return base && personOk && actorOk;
  }
  if(q.type==="culture"){
    const timeOk = omitsCenturyHalf(q) ? true : (usesTimeRange(q) ? a.timeRange===q.timeRange : (a.century===q.century && a.half===q.half));
    return a.era===q.era && timeOk && a.culture===q.culture;
  }
  return a.era===q.era && a.century===q.century && a.half===q.half && a.culture===q.culture;
}
function canSubmit(q,a){
  if(q.type==="order") return a.length===q.items.length;
  if(q.type==="period"){
    const timeOk = usesTimeRange(q) ? Boolean(a.timeRange) : Boolean(a.century && a.half);
    const base = Boolean(a.era) && timeOk;
    const personOk = shouldAskPerson(q) ? Boolean(a.person) : true;
    const actorOk = shouldAskActor(q) ? Boolean(a.actor) : true;
    return base && personOk && actorOk;
  }
  if(q.type==="culture"){
    const timeOk = omitsCenturyHalf(q) ? true : (usesTimeRange(q) ? Boolean(a.timeRange) : Boolean(a.century && a.half));
    return Boolean(a.era && timeOk && a.culture);
  }
  return Boolean(a.era && a.century && a.half && a.culture);
}

function figureByQuestion(q){
  const key = `${q.person||''} ${q.term||''} ${q.title||''} ${q.culture||''}`;
  if(/大宝律令|平安京遷都|律令国家|古事記/.test(key)) return objectSVG("scroll");
  if(/飛鳥|奈良|文武天皇|桓武天皇/.test(key)) return objectSVG("pagoda");
  if(/鎌倉|北条|源頼朝|御成敗式目|文永の役|弘安の役|永仁の徳政令|承久の乱/.test(key)) return objectSVG("bell");
  if(/室町|足利|応仁の乱|日明貿易|南北朝|金閣|銀閣|江戸|徳川|関ヶ原|武家諸法度|参勤交代|寛政の改革|享保の改革|天保の改革|松平定信|生類憐みの令/.test(key)) return objectSVG("castle");
  if(/源氏物語|紫式部|国風文化|文化|舞姫|プロレタリア|金閣|銀閣|東山|北山/.test(key)) return objectSVG("book");
  if(/伊藤|加藤高明|若槻|普通選挙法|明治|大正|昭和|憲法|国会|内閣|帝国議会|教育勅語|護憲|選挙|治安維持|国際連盟/.test(key)) return objectSVG("diet");
  if(/満州事変|近代|工業|鉄砲|キリスト教|南蛮|国家総動員|太平洋戦争|日中戦争|三国同盟|高度経済成長|石油危機|プラザ合意|バブル/.test(key)) return objectSVG("factory");

function buildDetailedExplanation(q){
  const detail = q.detail || q.explanation || "";
  return `<div class="detailExplain">
    <div class="detailExplainTitle">解説</div>
    <p style="margin:0;line-height:1.9">${escapeHtml(detail)}</p>
  </div>`;
}
function renderQuestion(q){
  const correct = state.submitted && isCorrect(q,state.answer);
  if(q.type==="order"){
    const rem=q.displayItems.filter(it=>!state.answer.some(a=>a[0]===it[0]));
    const correctOrder=[...q.items].sort((a,b)=>a[1]-b[1]).map(x=>x[0]);
    return `
      ${renderQuestionHeader(q, q.prompt, "タップして、古い順に下へ並べていきましょう。", q.title)}

      <div class="choiceGroup">
        <div class="small"><b>選択肢</b></div>
        <div class="grid choices" style="margin-top:10px">
          ${rem.map(it=>`<button class="choiceBtn" data-order="${escapeHtml(it[0])}" ${state.submitted?'disabled':''}>${escapeHtml(it[0])}</button>`).join("")}
        </div>
      </div>

      <div class="answerBox">
        <div class="small"><b>あなたの並べ順</b></div>
        ${state.answer.length ? state.answer.map((it,i)=>{
          let cls="answerItem";
          if(state.submitted && correctOrder[i]===it[0]) cls+=" correct";
          if(state.submitted && correctOrder[i]!==it[0]) cls+=" wrong";
          const icon = !state.submitted ? "" : (correctOrder[i]===it[0] ? " ✅" : " ❌");
          return `<div class="${cls}">
            <div class="answerMain"><span class="step">${i+1}</span><span>${escapeHtml(it[0])}${icon}</span></div>
            ${!state.submitted?`<button class="ghostBtn" data-remove="${escapeHtml(it[0])}">取り消す</button>`:""}
          </div>`
        }).join("") : `<p class="small">まだ並べていません。上の選択肢を古い順にタップしてください。</p>`}
      </div>

      ${state.submitted ? `<div class="answerFeedback">${statusBanner(correct)}${explainBlock(q, `
        <div class="muted">正しい順序</div>
        <h2>${correctOrder.map(escapeHtml).join(" → ")}</h2>
        ${buildDetailedExplanation(q)}
        ${!correct ? renderDiffForOrder(q, state.answer) : ""}
      `)}</div>` : ""}
    `;
  }
  if(q.type==="period"){
    return `
      ${statusBanner(correct)}
      ${renderQuestionHeader(q, q.term, usesTimeRange(q) ? "何時代・どの年代の出来事かを選びましょう。必要な問題では、その時の天皇・将軍・内閣、または重要な政権担当者も別々に選びます。" : "何時代・何世紀・前半／後半の出来事かを選びましょう。必要な問題では、その時の天皇・将軍・内閣、または重要な政権担当者も別々に選びます。", usesTimeRange(q) ? "時代・年代・政権担当者判断" : "時代・世紀・政権担当者判断")}
      ${renderChoiceGroup("何時代か", q.options.era, "era", q.era)}
      ${usesTimeRange(q) ? renderChoiceGroup("どの年代か", q.options.timeRange, "timeRange", q.timeRange) : `
        ${renderChoiceGroup("何世紀か", q.options.century, "century", q.century)}
        ${renderChoiceGroup("前半／後半", q.options.half, "half", q.half, true)}
      `}
      ${shouldAskPerson(q) ? renderChoiceGroup("その時の天皇・将軍・内閣", q.options.person, "person", q.person) : ""}
      ${shouldAskActor(q) ? renderChoiceGroup("重要な政権担当者・関係人物", q.options.actor, "actor", q.actor) : ""}

      ${state.submitted ? `<div class="answerFeedback">${statusBanner(correct)}${explainBlock(q, `
        <div class="muted">正解</div>
        <div class="answerChips">
          <span class="chip">${escapeHtml(q.era)}</span>
          ${usesTimeRange(q) ? `<span class="chip">${escapeHtml(q.timeRange)}</span>` : `<span class="chip">${escapeHtml(q.century)}</span><span class="chip">${escapeHtml(q.half)}</span>`}
          ${shouldAskPerson(q) ? `<span class="chip">${escapeHtml(q.person)}</span>` : ""}
          ${shouldAskActor(q) ? `<span class="chip">${escapeHtml(q.actor)}</span>` : ""}
        </div>
        ${buildDetailedExplanation(q)}
        ${!correct ? renderDiffForPeriodCulture(q, state.answer) : ""}
      `)}</div>` : ""}
    `;
  }
  return `
    ${renderQuestionHeader(q, q.term, omitsCenturyHalf(q) ? "この文化事項について、時代・文化区分を選びましょう。" : (usesTimeRange(q) ? "この文化事項について、時代・年代・文化区分を選びましょう。" : "この文化事項について、時代・世紀・前半／後半・文化区分を選びましょう。"), omitsCenturyHalf(q) ? "文化史の時代判断" : (usesTimeRange(q) ? "文化史の年代判断" : "文化史の時期判断"))}
    ${renderChoiceGroup("何時代か", q.options.era, "era", q.era)}
    ${omitsCenturyHalf(q) ? `` : (usesTimeRange(q) ? renderChoiceGroup("どの年代か", q.options.timeRange, "timeRange", q.timeRange) : `
      ${renderChoiceGroup("何世紀か", q.options.century, "century", q.century)}
      ${renderChoiceGroup("前半／後半", q.options.half, "half", q.half, true)}
    `)}
    ${renderChoiceGroup("どの文化に関係するか", q.options.culture, "culture", q.culture)}

    ${state.submitted ? `<div class="answerFeedback">${statusBanner(correct)}${explainBlock(q, `
      <div class="muted">正解</div>
      <div class="answerChips">
        <span class="chip">${escapeHtml(q.era)}</span>
        ${omitsCenturyHalf(q) ? `` : (usesTimeRange(q) ? `<span class="chip">${escapeHtml(q.timeRange)}</span>` : `<span class="chip">${escapeHtml(q.century)}</span><span class="chip">${escapeHtml(q.half)}</span>`)}
        <span class="chip">${escapeHtml(q.culture)}</span>
      </div>
      ${buildDetailedExplanation(q)}
      ${!correct ? renderDiffForPeriodCulture(q, state.answer) : ""}
    `)}</div>` : ""}
  `;
}
function renderQuiz(){
  if(state.index>=state.quiz.length){return renderResult()}
  const q=state.quiz[state.index], ok=state.submitted && isCorrect(q,state.answer);
  app.innerHTML=`<div class="wrap">
    <div class="topbar">
      <button class="secondary" id="back">トップに戻る</button>
      <div>
        <span class="pill">📚 ${MODES.find(m=>m.id===state.mode).label}</span>
        <span class="pill">🗂️ ${SCOPES.find(s=>s.id===state.scope).label}</span>
        <span class="pill">📝 ${state.index+1}/${state.quiz.length}</span>
      </div>
    </div>

    <div class="progressWrap"><div class="bar" style="width:${Math.round((state.index+1)/state.quiz.length*100)}%"></div></div>

    <section class="card">
      ${renderQuestion(q)}
      <div class="footerActions">
        <div class="resultMini">
          ${state.submitted ? (ok ? '✅ この問題は正解です' : '❌ この問題は不正解です') : '解答を選んでください'}
        </div>
        <div>
          ${!state.submitted && q.type==="order" ? '<button class="secondary" id="resetOrder">やり直す</button>' : ''}
          ${!state.submitted
            ? `<button class="primary" id="submit" style="width:auto" ${canSubmit(q,state.answer)?'':'disabled'}>採点する</button>`
            : `<button class="primary" id="next" style="width:auto">${state.index+1>=state.quiz.length?'結果を見る':'次の問題へ'}</button>`}
        </div>
      </div>
    </section>
  </div>`;

  $("#back").onclick=()=>set({screen:"home",quiz:[]});
  const sub=$("#submit");
  if(sub) sub.onclick=()=>{
    const correctNow = isCorrect(q,state.answer);
    state.results[state.index]={question:q, answer:state.answer, correct:correctNow};
    playResultSound(correctNow);
    set({submitted:true});
    scrollToQuizTop(".answerFeedback");
  };
  const next=$("#next");
  if(next) next.onclick=()=>{
    const ni=state.index+1;
    if(ni>=state.quiz.length){
      set({index:ni});
      scrollToQuizTop(".hero");
    }else{
      set({index:ni, answer:initialAnswer(state.quiz[ni]), submitted:false});
      scrollToQuizTop(".questionHead");
    }
  };
  const reset=$("#resetOrder");
  if(reset) reset.onclick=()=>set({answer:[]});
  document.querySelectorAll("[data-order]").forEach(b=>b.onclick=()=>{
    const it=q.items.find(x=>x[0]===b.dataset.order);
    set({answer:[...state.answer,it]});
  });
  document.querySelectorAll("[data-remove]").forEach(b=>b.onclick=()=>set({answer:state.answer.filter(x=>x[0]!==b.dataset.remove)}));
  document.querySelectorAll("[data-choice-key]").forEach(b=>b.onclick=()=>{
    const key=b.dataset.choiceKey;
    state.answer[key]=b.dataset.choiceVal;
    set({answer:{...state.answer}});
  });
}
function renderResult(){
  const correct=state.results.filter(r=>r&&r.correct).length;
  const wrongs=state.results.filter(r=>r&&!r.correct);
  const rate=Math.round(correct/state.quiz.length*100);
  const heroPerson = rate >= 80 ? objectSVG("pagoda") : rate >= 60 ? objectSVG("diet") : objectSVG("castle");
  app.innerHTML=`<div class="wrap">
    <section class="hero">
      <div class="heroGrid">
        <div>
          <span class="badge">おつかれさまでした</span>
          <h1>結果発表</h1>
          <div class="summaryCard">
            <div class="small">正答数</div>
            <div class="resultBig">${correct} / ${state.quiz.length}</div>
            <div style="margin-top:8px;font-weight:900">${rate >= 80 ? '🌸 とてもよいです！' : rate >= 60 ? '👍 まずまずです！' : '💪 復習してもう一度挑戦！'}</div>
            <div class="small">正答率 ${rate}%</div>
          </div>
        </div>
        <div class="mascotArea">
          <div class="miniCard">${heroPerson}</div>
          <div class="miniCard">${objectSVG("book")}</div>
        </div>
      </div>

      ${wrongs.length ? `<div class="card" style="margin-top:18px">
        <h2>復習すべき問題</h2>
        ${wrongs.map(r=>`<div class="reviewItem">
          <div style="font-weight:1000">${escapeHtml(r.question.type==="order" ? r.question.title : r.question.term)}</div>
          <div class="small">${escapeHtml(r.question.explanation)}</div>
        </div>`).join("")}
      </div>` : `<div class="note" style="margin-top:16px">全問正解です。すばらしい！</div>`}
      <div style="margin-top:16px"><button class="primary" id="backHome">トップに戻る</button></div>
    </section>
  </div>`;
  $("#backHome").onclick=()=>set({screen:"home",quiz:[]});
}
function render(){state.screen==="home"?renderHome():renderQuiz()}
render();
</script>
</body>
</html>
